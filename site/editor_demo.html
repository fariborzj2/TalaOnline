<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseEditor Demo</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/editor.css">
    <script src="assets/js/vendor/lucide.js"></script>
    <style>
        body { background: #f1f5f9; padding: 40px 20px; }
        .demo-container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .demo-section { margin-bottom: 40px; padding-bottom: 40px; border-bottom: 1px solid #e2e8f0; }
        .demo-section:last-child { border-bottom: none; }
        h1 { color: #1e293b; margin-bottom: 30px; text-align: center; }
        h2 { font-size: 1.2rem; margin-bottom: 15px; color: #334155; }
        .actions { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .btn:hover { background: #f8fafc; border-color: #94a3b8; }
        .btn-primary { background: #249E94; color: #fff; border-color: #249E94; }
        .btn-primary:hover { background: #1f8a81; border-color: #1f8a81; }
        pre { background: #1e293b; color: #e2e8f0; padding: 15px; border-radius: 12px; direction: ltr; text-align: left; overflow-x: auto; font-size: 0.85rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="demo-container">
    <h1>BaseEditor نمایش کتابخانه</h1>

    <!-- Basic Implementation -->
    <div class="demo-section">
        <h2>۱. پیاده‌سازی پایه (نظرات کاربران)</h2>
        <textarea id="editor-basic" placeholder="نظر خود را بنویسید..."></textarea>
        <div class="actions">
            <button class="btn btn-primary" onclick="handleGetContent('editor-basic')">دریافت محتوا</button>
            <button class="btn" onclick="editorBasic.clear()">پاکسازی</button>
            <button class="btn" onclick="editorBasic.disable()">غیرفعال کردن</button>
            <button class="btn" onclick="editorBasic.enable()">فعال کردن</button>
        </div>
        <div id="output-editor-basic"></div>
    </div>

    <!-- Full Featured with Validation -->
    <div class="demo-section">
        <h2>۲. تنظیمات پیشرفته (اعتبار سنجی و طول محدود)</h2>
        <textarea id="editor-advanced">محتوای پیش‌فرض برای تست...</textarea>
        <div class="actions">
            <button class="btn btn-primary" onclick="handleValidate()">اعتبار سنجی و ارسال</button>
            <button class="btn" onclick="editorAdvanced.setContent('<p>محتوای <strong>جدید</strong> جایگزین شد.</p>')">تنظیم محتوا</button>
        </div>
        <div id="output-editor-advanced"></div>
    </div>

    <!-- Custom Toolbar -->
    <div class="demo-section">
        <h2>۳. نوار ابزار سفارشی (فقط Bold و Italic)</h2>
        <div id="editor-custom-container">
            <textarea id="editor-custom"></textarea>
        </div>
    </div>
</div>

<script src="assets/js/editor.js"></script>
<script>
    // Instance 1: Basic
    const editorBasic = new BaseEditor({
        el: '#editor-basic',
        autosave: true,
        autosaveKey: 'demo-basic-draft',
        onSubmit: (content) => {
            alert('ارسال شد:\n' + content);
        }
    });

    // Instance 2: Advanced
    const editorAdvanced = new BaseEditor({
        el: '#editor-advanced',
        minLength: 20,
        maxLength: 500,
        toolbar: ['bold', 'italic', 'blockquote', 'ul', 'ol', 'clear'],
        onValidateFail: (errors) => {
            alert('خطای اعتبار سنجی:\n' + errors.join('\n'));
        }
    });

    // Instance 3: Custom
    const editorCustom = new BaseEditor({
        el: '#editor-custom',
        toolbar: ['bold', 'italic', 'clear'],
        preview: false,
        placeholder: 'این ویرایشگر پیش‌نمایش ندارد...'
    });

    // Helpers
    function handleGetContent(id) {
        const content = window.editorBasic.getContent();
        document.getElementById('output-' + id).innerHTML = '<pre>' + escapeHtml(content) + '</pre>';
    }

    function handleValidate() {
        if (editorAdvanced.validate()) {
            const content = editorAdvanced.getContent();
            document.getElementById('output-editor-advanced').innerHTML = '<p style="color: green">معتبر است!</p><pre>' + escapeHtml(content) + '</pre>';
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Initialize Lucide if needed (BaseEditor does it internally if global lucide exists)
    if (window.lucide) {
        lucide.createIcons();
    }
</script>

</body>
</html>
