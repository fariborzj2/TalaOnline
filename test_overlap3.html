<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer base {
            input[type="text"], input[type="password"], input[type="email"], input[type="number"], select, textarea {
                @apply w-full border border-slate-200 bg-white rounded-lg px-4 py-2 outline-none transition-all duration-200 font-bold focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10;
            }
        }
        /* Input with icon fix */
        .input-icon-wrapper {
            @apply relative;
        }
        .input-icon-wrapper input {
            @apply !pr-12;
        }
        .input-icon-wrapper .icon {
            @apply absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none flex items-center justify-center;
        }
        .ltr-input {
            direction: ltr !important;
            text-align: left !important;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="p-10 bg-slate-100">

    <div class="input-icon-wrapper">
        <span class="icon"><i data-lucide="lock" class="w-4 h-4"></i></span>
        <input type="text" name="settings[smtp_password]" class="text-sm" placeholder="••••••••" value="short text that is RTL">
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
